name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-java

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: ["17", "21"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"

      - name: Build and test (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew clean build -x publishToMavenLocal --no-daemon

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew clean build -x publishToMavenLocal --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.java-version }}
          path: lytecache-java/build/test-results/

      - name: Publish to Maven Local
        if: matrix.java-version == '21' && matrix.os == 'ubuntu-latest'
        run: ./gradlew publishToMavenLocal --no-daemon

      - name: Verify artifact
        if: matrix.java-version == '21' && matrix.os == 'ubuntu-latest'
        # Path matches build.gradle.kts's group = "io.github.lytecache", not
        # the earlier "io.lytecache" (see that file's comment on why it
        # changed) -- this step went stale when the groupId did.
        run: ls -la ~/.m2/repository/io/github/lytecache/lytecache/
