name: Release Java to Maven Central

on:
  push:
    tags:
      # Distinct prefix from the Python release tags (python-v*) so tagging one
      # package's release can never accidentally trigger the other's workflow.
      - "java-v*"

defaults:
  run:
    working-directory: lytecache-java

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Publish to Maven Local (verify)
        run: ./gradlew publishToMavenLocal --no-daemon

      - name: Publish signed release to Sonatype Central
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./gradlew publishMavenJavaPublicationToSonatypeCentralRepository --no-daemon

      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # LyteCache Java ${{ github.ref_name }}

          See lytecache-java/README.md for usage and lytecache-java/SPEC.md for the storage format.

          ## Installation

          ```gradle
          implementation 'io.lytecache:lytecache:${{ github.ref_name }}'
          ```

          ## Artifacts

          - lytecache-${{ github.ref_name }}.jar
          - lytecache-${{ github.ref_name }}-sources.jar
          - lytecache-${{ github.ref_name }}-javadoc.jar
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          body_path: lytecache-java/release-notes.md
          files: |
            lytecache-java/build/libs/lytecache-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
