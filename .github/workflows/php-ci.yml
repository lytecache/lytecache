name: PHP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: lytecache-php

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        php-version: ["8.2", "8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          # pdo/pdo_sqlite are the core's only real runtime requirement; fileinfo
          # is not used by lytecache itself but is required transitively by
          # laravel/framework (via league/flysystem-local) in require-dev, and
          # isn't enabled by default on the Windows runner's PHP build -- without
          # it, Composer can't resolve a laravel/framework 12.x + PHP 8.2
          # dependency graph at all and falls back toward 11.x releases that are
          # blocked by Composer's security-advisory audit.
          extensions: pdo, pdo_sqlite, fileinfo
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        # No composer.lock is committed (standard practice for libraries -- see
        # RELEASING.md) so each PHP version in the matrix resolves its own
        # compatible dependency graph via `composer update`, rather than all
        # three versions being forced through one lock file resolved against
        # a single PHP version.
        run: composer update --prefer-dist --no-progress

      - name: PHPStan
        if: matrix.php-version == '8.3' && matrix.os == 'ubuntu-latest'
        run: composer stan

      - name: Pint
        if: matrix.php-version == '8.3' && matrix.os == 'ubuntu-latest'
        run: composer pint:test

      - name: PHPUnit
        run: composer test
